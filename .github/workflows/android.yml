name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cari & Extract Project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" -type f | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: File ZIP tidak ditemukan!"
            ls -la
            exit 1
          fi

          rm -rf project
          mkdir project
          unzip -o "$ZIP_FILE" -d project

          GRADLEW_PATH=$(find ./project -name "gradlew" -type f | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: gradlew tidak ditemukan!"
            exit 1
          fi

          REAL_DIR=$(dirname "$GRADLEW_PATH")
          echo "PROJECT_DIR=$REAL_DIR" >> $GITHUB_ENV

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_DIR }}

          echo "=== Lokasi Project ==="
          pwd

          chmod +x gradlew

          ./gradlew --version

          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
