name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cari & Extract Project
        run: |
          # Cari file zip apapun di repo
          ZIP_FILE=$(find . -name "*.zip" -type f | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Tidak ditemukan file .zip di repository!"
            ls -la
            exit 1
          fi
          
          echo "Menemukan file: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted_project
          
          # Cari lokasi gradlew setelah extract
          GRADLEW_PATH=$(find ./extracted_project -name "gradlew" -type f | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: File gradlew tidak ditemukan di dalam zip!"
            find ./extracted_project -type f | head -20
            exit 1
          fi
          
          GRADLE_DIR=$(dirname "$GRADLEW_PATH")
          echo "PROJECT_DIR=$GRADLE_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
