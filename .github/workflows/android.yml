- name: Build APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          
          # Path file wrapper jar
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          
          # Cek apakah file ada dan valid (bukan corrupt)
          if [ ! -f "$WRAPPER_JAR" ] || ! jar tf "$WRAPPER_JAR" &>/dev/null; then
            echo "Wrapper rusak/hilang, download versi 8.2..."
            mkdir -p gradle/wrapper
            # Download langsung dari repo resmi Gradle v8.2
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -o "$WRAPPER_JAR"
          fi
          
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
